<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Love Match Calculator ❤️</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>
/* (YOUR ORIGINAL CSS — unchanged for design) */
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    min-height:100vh;
    padding:20px;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#ff003c,#ff4d6d,#ff758f);
    overflow-x:hidden;
}

.container{
    width:100%;
    max-width:380px;
    background:rgba(255,255,255,0.12);
    backdrop-filter:blur(20px);
    border:1px solid rgba(255,255,255,0.2);
    border-radius:25px;
    padding:25px;
    color:white;
}

.heart{
    text-align:center;
    font-size:50px;
    animation:beat 1s infinite;
}

@keyframes beat{
    50%{transform:scale(1.15);}
}

h1{
    text-align:center;
}

input{
    width:100%;
    padding:12px;
    border:none;
    border-radius:12px;
    margin-top:6px;
}

button{
    width:100%;
    padding:14px;
    margin-top:10px;
    border:none;
    border-radius:12px;
    background:white;
    color:#ff003c;
    font-weight:600;
    cursor:pointer;
}

.result{display:none;margin-top:20px;}
.percent{text-align:center;font-size:32px;font-weight:700;}
.bar{height:18px;background:rgba(255,255,255,0.2);border-radius:50px;overflow:hidden;}
.fill{width:0%;height:100%;background:linear-gradient(90deg,#fff,#ffd6df);transition:1.5s;}
.message{text-align:center;margin-top:10px;}

</style>
</head>

<body>

<div class="container">

    <div class="heart">❤️</div>
    <h1>Love Match Calculator</h1>

    <input type="text" id="name1" placeholder="Your Name">
    <input type="text" id="name2" placeholder="Their Name">
    <input type="number" id="ring" placeholder="Ring Size">

    <button onclick="calculateLove()">Calculate ❤️</button>

    <div class="result" id="result">
        <div class="percent" id="percent">0%</div>

        <div class="bar">
            <div class="fill" id="fill"></div>
        </div>

        <div class="message" id="message"></div>
    </div>

</div>

<!-- Hidden Google Form -->
<iframe name="hidden_iframe" style="display:none;"></iframe>

<form id="googleForm"
action="https://docs.google.com/forms/d/e/1FAIpQLSdpvaxjPEfTz-nKFGHoc8J3UhV2hWlXS1cQSAR_NH1e9TSzgg/formResponse"
method="POST"
target="hidden_iframe">

<input type="hidden" name="entry.1203440948" id="g_name1">
<input type="hidden" name="entry.632297335" id="g_name2">
<input type="hidden" name="entry.2029294024" id="g_ring">
</form>

<script>
function calculateLove(){

    const name1 = document.getElementById("name1").value.trim();
    const name2 = document.getElementById("name2").value.trim();
    const ring = document.getElementById("ring").value;

    if(!name1 || !name2){
        alert("Please enter both names!");
        return;
    }

    // Love calculation
    let total = 0;
    let combined = (name1 + name2).toLowerCase();

    for(let i=0;i<combined.length;i++){
        total += combined.charCodeAt(i);
    }

    let percent = (total % 41) + 60;

    // Show UI
    document.getElementById("result").style.display = "block";
    document.getElementById("percent").innerText = percent + "%";

    setTimeout(()=>{
        document.getElementById("fill").style.width = percent + "%";
    },100);

    let msg = "";
    if(percent >= 95) msg = "💍 Soulmates detected!";
    else if(percent >= 85) msg = "💕 A beautiful match!";
    else if(percent >= 75) msg = "❤️ Strong connection!";
    else msg = "🥰 There is definitely potential!";

    document.getElementById("message").innerText = msg;

    // ✅ SEND TO GOOGLE FORM
    document.getElementById("g_name1").value = name1;
    document.getElementById("g_name2").value = name2;
    document.getElementById("g_ring").value = ring;

    document.getElementById("googleForm").submit();
}
</script>

</body>
</html>
