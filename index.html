<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Submit to Google Form</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
    font-family: Arial;
    background: linear-gradient(135deg,#ff4d6d,#ff003c);
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    margin:0;
}

.box{
    background:white;
    padding:25px;
    border-radius:15px;
    width:320px;
    box-shadow:0 10px 25px rgba(0,0,0,0.2);
}

h2{
    text-align:center;
    margin-bottom:15px;
}

input{
    width:100%;
    padding:10px;
    margin:8px 0;
    border:1px solid #ddd;
    border-radius:8px;
}

button{
    width:100%;
    padding:12px;
    background:#ff003c;
    color:white;
    border:none;
    border-radius:8px;
    font-weight:bold;
    cursor:pointer;
}

button:hover{
    background:#e60035;
}
</style>
</head>

<body>

<div class="box">
    <h2>Google Form Submit</h2>

    <form action="https://docs.google.com/forms/d/e/1FAIpQLSdpvaxjPEfTz-nKFGHoc8J3UhV2hWlXS1cQSAR_NH1e9TSzgg/formResponse" method="POST" target="hidden_iframe" onsubmit="done()">

        <input type="text" name="entry.1203440948" placeholder="Your Name" required>

        <input type="text" name="entry.632297335" placeholder="Their Name" required>

        <input type="number" name="entry.2029294024" placeholder="Ring Size (mm)" required>

        <button type="submit">Submit ❤️</button>
    </form>

    <p id="msg" style="text-align:center;color:green;margin-top:10px;"></p>
</div>

<iframe name="hidden_iframe" style="display:none;"></iframe>

<script>
function done(){
    document.getElementById("msg").innerText = "Submitted successfully ❤️";
}
</script>

</body>
</html>
