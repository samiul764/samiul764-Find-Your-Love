<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Love Match Calculator ❤️</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

    <div class="heart">❤️</div>
    <h1>Love Match AI</h1>

    <input type="text" id="name1" placeholder="Your Name">
    <input type="text" id="name2" placeholder="Their Name">
    <input type="text" id="loveText" placeholder="What do you love about them?">

    <div class="error" id="errorMsg"></div>

    <button onclick="calculateLove()">Calculate ❤️</button>

    <div class="result" id="result">
        <div class="percent" id="percent">0%</div>

        <div class="bar">
            <div class="fill" id="fill"></div>
        </div>

        <div class="message" id="message"></div>
    </div>

</div>

<!-- overlay -->
<div class="overlay" id="overlay">
    <div class="loaderCard">
        <div class="spinner"></div>
        <p>Calculating compatibility...</p>
    </div>
</div>

<!-- footer -->
<div class="footer">
    </> developed by Prottoy • a class 10 coder 
</div>

<script>
function calculateLove(){

    let n1 = document.getElementById("name1").value.trim();
    let n2 = document.getElementById("name2").value.trim();
    let love = document.getElementById("loveText").value.trim();

    let error = document.getElementById("errorMsg");

    if(!n1 || !n2 || !love){
        error.innerText = "❌ Please fill all fields!";
        return;
    }

    error.innerText = "";

    document.getElementById("overlay").style.display = "flex";

    setTimeout(() => {

        let percent = Math.floor(Math.random()*41 + 60);

        document.getElementById("overlay").style.display = "none";

        document.getElementById("result").style.display = "block";
        document.getElementById("percent").innerText = percent + "%";
        document.getElementById("fill").style.width = percent + "%";

        let msg = "";

        if(percent > 85) msg = "💖 Perfect match!";
        else if(percent > 70) msg = "💘 Strong connection!";
        else msg = "💗 Good vibes!";

        document.getElementById("message").innerText = msg;

    }, 1500);
}
</script>

</body>
</html>
