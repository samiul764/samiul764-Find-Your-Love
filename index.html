
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Love Match Calculator ❤️</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    min-height:100vh;
    padding:20px;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#ff003c,#ff4d6d,#ff758f);
    overflow-x:hidden;
}

body::before{
    content:"";
    position:absolute;
    width:500px;
    height:500px;
    background:rgba(255,255,255,0.08);
    border-radius:50%;
    filter:blur(100px);
    animation:float 6s infinite ease-in-out;
}

@keyframes float{
    50%{
        transform:translateY(-20px);
    }
}

@keyframes beat{
    50%{
        transform:scale(1.15);
    }
}

.container{
    width:100%;
    max-width:380px;
    background:rgba(255,255,255,0.12);
    backdrop-filter:blur(20px);
    border:1px solid rgba(255,255,255,0.2);
    border-radius:25px;
    padding:25px;
    color:white;
    box-shadow:0 15px 40px rgba(0,0,0,0.2);
    z-index:1;
}

.heart{
    text-align:center;
    font-size:50px;
    animation:beat 1s infinite;
}

h1{
    text-align:center;
    font-size:24px;
    margin:10px 0 20px;
}

.input-group{
    margin-bottom:15px;
}

label{
    display:block;
    margin-bottom:8px;
    font-size:14px;
}

input{
    width:100%;
    padding:12px;
    border:none;
    outline:none;
    border-radius:12px;
    background:rgba(255,255,255,0.15);
    color:white;
    font-size:15px;
}

input::placeholder{
    color:rgba(255,255,255,0.7);
}

button{
    width:100%;
    padding:14px;
    margin-top:10px;
    border:none;
    border-radius:12px;
    background:white;
    color:#ff003c;
    font-size:16px;
    font-weight:600;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    transform:translateY(-2px);
}

.result{
    display:none;
    margin-top:20px;
}

.percent{
    text-align:center;
    font-size:32px;
    font-weight:700;
    margin-bottom:15px;
}

.bar{
    width:100%;
    height:20px;
    background:rgba(255,255,255,0.2);
    border-radius:50px;
    overflow:hidden;
}

.fill{
    width:0%;
    height:100%;
    border-radius:50px;
    background:linear-gradient(90deg,#ffffff,#ffd6df);
    transition:2s ease;
}

.message{
    margin-top:15px;
    text-align:center;
    font-size:15px;
}

@media(max-width:480px){

    .container{
        max-width:100%;
        padding:20px;
    }

    h1{
        font-size:22px;
    }

    .percent{
        font-size:28px;
    }

    .heart{
        font-size:42px;
    }
}
</style>
</head>
<body>

<div class="container">

    <div class="heart">❤️</div>

    <h1>Love Match Calculator</h1>

    <div class="input-group">
        <label>Your Name</label>
        <input type="text" id="name1" placeholder="Enter your name">
    </div>

    <div class="input-group">
        <label>Their Name</label>
        <input type="text" id="name2" placeholder="Enter their name">
    </div>

    <div class="input-group">
        <label>Your Ring Size (cm) 💍</label>
        <input type="number" id="ring" placeholder="e.g. 17.5">
    </div>

    <button onclick="calculateLove()">
        Calculate Compatibility ❤️
    </button>

    <div class="result" id="result">
        <div class="percent" id="percent">0%</div>

        <div class="bar">
            <div class="fill" id="fill"></div>
        </div>

        <div class="message" id="message"></div>
    </div>

</div>

<script>
function calculateLove(){

    const name1 = document.getElementById("name1").value.trim();
    const name2 = document.getElementById("name2").value.trim();

    if(name1 === "" || name2 === ""){
        alert("Please enter both names!");
        return;
    }

    let total = 0;
    let combined = (name1 + name2).toLowerCase();

    for(let i = 0; i < combined.length; i++){
        total += combined.charCodeAt(i);
    }

    const percent = (total % 41) + 60; 

    document.getElementById("result").style.display = "block";

    setTimeout(() => {
        document.getElementById("fill").style.width = percent + "%";
    }, 100);

    document.getElementById("percent").innerText = percent + "%";

    let message = "";

    if(percent >= 95){
        message = "💍 Soulmates detected!";
    }
    else if(percent >= 85){
        message = "💕 A beautiful match!";
    }
    else if(percent >= 75){
        message = "❤️ Strong connection!";
    }
    else{
        message = "🥰 There is definitely potential!";
    }

    document.getElementById("message").innerText = message;

    // Ring size available in browser console
    console.log("Ring Size (mm):", document.getElementById("ring").value);
}
</script>
</body>
</html>
