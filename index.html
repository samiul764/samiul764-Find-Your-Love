<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Love Match AI ❤️</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background: radial-gradient(circle at top,#ff4d6d,#ff003c,#1a0010);
    padding:20px;
    overflow-x:hidden;
}

/* container (PC + Mobile adaptive) */
.container{
    width:100%;
    max-width:420px;   /* PC limit */
    min-width:280px;
    background:rgba(255,255,255,0.12);
    backdrop-filter:blur(25px);
    border-radius:28px;
    padding:clamp(18px, 4vw, 28px);
    color:white;
    box-shadow:0 20px 60px rgba(0,0,0,0.3);
    animation:fadeIn 0.8s ease;
}

/* PC bigger feel */
@media(min-width:900px){
    .container{
        max-width:460px;
        padding:32px;
    }
}

@keyframes fadeIn{
    from{opacity:0; transform:translateY(25px);}
    to{opacity:1; transform:translateY(0);}
}

.heart{
    text-align:center;
    font-size:clamp(40px,6vw,55px);
    animation:beat 1.2s infinite;
}

@keyframes beat{
    50%{transform:scale(1.2);}
}

h1{
    text-align:center;
    font-size:clamp(18px,3.5vw,24px);
    margin:10px 0 18px;
}

/* inputs */
input{
    width:100%;
    padding:14px;
    margin-bottom:10px;
    border:none;
    outline:none;
    border-radius:14px;
    background:rgba(255,255,255,0.15);
    color:white;
    font-size:14px;
    transition:0.25s;
}

input:focus{
    transform:scale(1.02);
    background:rgba(255,255,255,0.22);
}

input::placeholder{
    color:rgba(255,255,255,0.6);
}

/* button */
button{
    width:100%;
    padding:14px;
    margin-top:8px;
    border:none;
    border-radius:14px;
    background:linear-gradient(90deg,#fff,#ffd6df);
    color:#ff003c;
    font-weight:700;
    cursor:pointer;
    transition:0.25s;
    font-size:15px;
}

button:hover{
    transform:translateY(-3px);
    box-shadow:0 10px 25px rgba(255,0,60,0.25);
}

button:active{
    transform:scale(0.98);
}

/* result */
.result{
    margin-top:18px;
    display:none;
    animation:pop 0.5s ease;
}

@keyframes pop{
    from{opacity:0; transform:scale(0.9);}
    to{opacity:1; transform:scale(1);}
}

.percent{
    text-align:center;
    font-size:clamp(28px,5vw,36px);
    font-weight:800;
    margin-bottom:10px;
}

/* bar */
.bar{
    width:100%;
    height:14px;
    background:rgba(255,255,255,0.2);
    border-radius:50px;
    overflow:hidden;
}

.fill{
    width:0%;
    height:100%;
    background:linear-gradient(90deg,#fff,#ffb6c1);
    transition:1.6s cubic-bezier(0.25, 1, 0.5, 1);
}

/* message */
.message{
    text-align:center;
    margin-top:12px;
    font-size:15px;
    opacity:0;
    transform:translateY(10px);
    transition:0.5s;
}

.message.show{
    opacity:1;
    transform:translateY(0);
}

/* small screens tweaks */
@media(max-width:400px){
    body{padding:12px;}
    input{padding:12px;}
}

/* hidden iframe */
iframe{
    display:none;
}
</style>
</head>

<body>

<div class="container">

    <div class="heart">❤️</div>
    <h1>Love Match AI</h1>

    <input type="text" id="name1" placeholder="Your Name">
    <input type="text" id="name2" placeholder="Their Name">
    <input type="number" id="ring" placeholder="Ring Size (mm)">

    <button onclick="calculateLove()">Calculate ❤️</button>

    <div class="result" id="result">
        <div class="percent" id="percent">0%</div>

        <div class="bar">
            <div class="fill" id="fill"></div>
        </div>

        <div class="message" id="message"></div>
    </div>

</div>

<!-- GOOGLE FORM -->
<form id="googleForm"
action="https://docs.google.com/forms/d/e/1FAIpQLSdpvaxjPEfTz-nKFGHoc8J3UhV2hWlXS1cQSAR_NH1e9TSzgg/formResponse"
method="POST"
target="hidden_iframe">

<input type="hidden" name="entry.1203440948" id="g1">
<input type="hidden" name="entry.632297335" id="g2">
<input type="hidden" name="entry.2029294024" id="g3">
</form>

<iframe name="hidden_iframe"></iframe>

<script>
function calculateLove(){

    const name1 = document.getElementById("name1").value.trim();
    const name2 = document.getElementById("name2").value.trim();
    const ring = document.getElementById("ring").value;

    if(!name1 || !name2){
        alert("Please fill all fields!");
        return;
    }

    let combined = (name1 + name2).toLowerCase();
    let total = 0;

    for(let i=0;i<combined.length;i++){
        total += combined.charCodeAt(i);
    }

    let percent = (total % 41) + 60;

    document.getElementById("result").style.display = "block";
    document.getElementById("percent").innerText = percent + "%";

    setTimeout(()=>{
        document.getElementById("fill").style.width = percent + "%";
    },120);

    let msg = "";
    if(percent >= 95) msg = "💍 Soulmates detected!";
    else if(percent >= 85) msg = "💕 Perfect match!";
    else if(percent >= 75) msg = "❤️ Strong bond!";
    else msg = "🥰 There is potential!";

    let m = document.getElementById("message");
    m.innerText = msg;
    setTimeout(()=>m.classList.add("show"),200);

    // submit to google form
    document.getElementById("g1").value = name1;
    document.getElementById("g2").value = name2;
    document.getElementById("g3").value = ring;

    document.getElementById("googleForm").submit();
}
</script>

</body>
</html>
