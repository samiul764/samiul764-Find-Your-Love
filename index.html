<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Love Match AI ❤️</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

html, body{
    width:100%;
    height:100%;
    overflow:hidden;
}

body{
    min-height:100svh;
    display:flex;
    justify-content:center;
    align-items:center;
    background: radial-gradient(circle at top,#ff4d6d,#ff003c,#1a0010);
    padding:20px;
}

/* particles */
.particle{
    position:fixed;
    width:6px;
    height:6px;
    background:white;
    border-radius:50%;
    opacity:0.3;
    animation:floatUp 8s linear infinite;
}

@keyframes floatUp{
    0%{transform:translateY(100vh);}
    100%{transform:translateY(-10vh);}
}

/* container */
.container{
    width:100%;
    max-width:420px;
    background:rgba(255,255,255,0.12);
    backdrop-filter:blur(25px);
    border-radius:28px;
    padding:26px;
    color:white;
    box-shadow:0 20px 60px rgba(0,0,0,0.3);
    animation:fadeIn 0.8s ease;
}

@keyframes fadeIn{
    from{opacity:0; transform:translateY(20px);}
    to{opacity:1; transform:translateY(0);}
}

.heart{
    text-align:center;
    font-size:52px;
    animation:beat 1.2s infinite;
}

@keyframes beat{
    50%{transform:scale(1.2);}
}

h1{
    text-align:center;
    font-size:22px;
    margin:10px 0 18px;
}

input{
    width:100%;
    padding:14px;
    margin-bottom:10px;
    border:none;
    outline:none;
    border-radius:14px;
    background:rgba(255,255,255,0.15);
    color:white;
    font-size:14px;
    transition:0.3s;
}

input:focus{
    transform:scale(1.02);
    background:rgba(255,255,255,0.22);
}

input::placeholder{
    color:rgba(255,255,255,0.6);
}

button{
    width:100%;
    padding:14px;
    margin-top:8px;
    border:none;
    border-radius:14px;
    background:linear-gradient(90deg,#fff,#ffd6df);
    color:#ff003c;
    font-weight:700;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    transform:translateY(-3px);
    box-shadow:0 10px 25px rgba(255,0,60,0.25);
}

/* result */
.result{
    margin-top:18px;
    display:none;
}

.percent{
    text-align:center;
    font-size:34px;
    font-weight:800;
}

.bar{
    width:100%;
    height:14px;
    background:rgba(255,255,255,0.2);
    border-radius:50px;
    overflow:hidden;
}

.fill{
    width:0%;
    height:100%;
    background:linear-gradient(90deg,#fff,#ffb6c1);
    transition:1.6s ease;
}

.message{
    text-align:center;
    margin-top:10px;
    opacity:0;
    transform:translateY(10px);
    transition:0.5s;
}

.message.show{
    opacity:1;
    transform:translateY(0);
}

/* TIKTOK OVERLAY */
.overlay{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:black;
    display:none;
    justify-content:center;
    align-items:center;
    z-index:9999;
}

.loaderText{
    color:white;
    font-size:18px;
    animation:pulseText 1s infinite;
}

@keyframes pulseText{
    50%{transform:scale(1.1); opacity:0.6;}
}

/* glitch effect */
.glitch{
    animation:glitch 0.3s 3;
}

@keyframes glitch{
    0%{transform:translate(0);}
    25%{transform:translate(-2px,2px);}
    50%{transform:translate(2px,-2px);}
    75%{transform:translate(-1px,1px);}
    100%{transform:translate(0);}
}

/* footer */
.footer{
    position:fixed;
    left:0;
    right:0;
    bottom:0;
    padding:7px 0;
    text-align:center;
    font-size:11px;
    color:rgba(255,255,255,0.8);
    background:rgba(0,0,0,0.25);
    backdrop-filter:blur(14px);
    border-top:1px solid rgba(255,255,255,0.15);
    z-index:999;
    overflow:hidden;
}

.footer-text{
    display:inline-block;
    white-space:nowrap;
    animation:slideText 12s linear infinite;
}

@keyframes slideText{
    0%{transform:translateX(100%);}
    100%{transform:translateX(-100%);}
}

/* mobile */
@media(max-width:480px){
    .container{padding:20px;}
    h1{font-size:20px;}
    .percent{font-size:28px;}
}

iframe{display:none;}
</style>
</head>

<body>

<div class="container">

    <div class="heart">❤️</div>
    <h1>Love Match AI</h1>

    <input type="text" id="name1" placeholder="Your Name">
    <input type="text" id="name2" placeholder="Their Name">
    <input type="number" id="ring" placeholder="Ring Size (mm)">

    <button onclick="calculateLove()">Calculate ❤️</button>

    <div class="result" id="result">
        <div class="percent" id="percent">0%</div>

        <div class="bar">
            <div class="fill" id="fill"></div>
        </div>

        <div class="message" id="message"></div>
    </div>

</div>

<!-- overlay -->
<div class="overlay" id="overlay">
    <div class="loaderText">Calculating Love...</div>
</div>

<!-- Google Form -->
<form id="googleForm"
action="https://docs.google.com/forms/d/e/1FAIpQLSdpvaxjPEfTz-nKFGHoc8J3UhV2hWlXS1cQSAR_NH1e9TSzgg/formResponse"
method="POST"
target="hidden_iframe">

<input type="hidden" name="entry.1203440948" id="g1">
<input type="hidden" name="entry.632297335" id="g2">
<input type="hidden" name="entry.2029294024" id="g3">
</form>

<iframe name="hidden_iframe"></iframe>

<!-- footer -->
<div class="footer">
    <div class="footer-text">
        dev </> prottoy • class 10 vibe coder • built for fun ❤️
    </div>
</div>

<script>

/* particles */
for(let i=0;i<15;i++){
    let p=document.createElement("div");
    p.className="particle";
    p.style.left=Math.random()*100+"vw";
    p.style.animationDuration=(5+Math.random()*5)+"s";
    document.body.appendChild(p);
}

function calculateLove(){

    const overlay=document.getElementById("overlay");
    overlay.style.display="flex";

    setTimeout(()=>{

        overlay.style.display="none";

        const name1=document.getElementById("name1").value.trim();
        const name2=document.getElementById("name2").value.trim();
        const ring=document.getElementById("ring").value;

        if(!name1||!name2){
            alert("Please fill all fields!");
            return;
        }

        let combined=(name1+name2).toLowerCase();
        let total=0;

        for(let i=0;i<combined.length;i++){
            total+=combined.charCodeAt(i);
        }

        let percent=(total%41)+60;

        document.getElementById("result").style.display="block";
        document.getElementById("percent").innerText=percent+"%";
        document.getElementById("percent").classList.add("glitch");

        setTimeout(()=>{
            document.getElementById("fill").style.width=percent+"%";
        },200);

        let msg="";
        if(percent>=95) msg="💍 SOULMATES!";
        else if(percent>=85) msg="💕 PERFECT MATCH!";
        else if(percent>=75) msg="❤️ STRONG BOND!";
        else msg="🥰 THERE IS POTENTIAL!";

        let m=document.getElementById("message");
        m.innerText=msg;
        setTimeout(()=>m.classList.add("show"),200);

        /* google form */
        document.getElementById("g1").value=name1;
        document.getElementById("g2").value=name2;
        document.getElementById("g3").value=ring;

        document.getElementById("googleForm").submit();

    },1800);
}

</script>

</body>
</html>
